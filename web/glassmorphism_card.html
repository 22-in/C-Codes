<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #121212; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card {
            width: 300px; padding: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: white; font-family: sans-serif;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        .card h2 { color: #00d2ff; }
    </style>
</head>
<body>
    <div class="card">
        <h2>C-Code Hub</h2>
        <p>This is a community-driven script library for advanced developers.</p>
    </div>
</body>
</html>
